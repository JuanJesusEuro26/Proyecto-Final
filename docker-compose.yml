version: '3.3'

services:
  app:
    build: 
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: symfony_app
    ports:
      - "8080:80"
    depends_on:
      - mysql

  mysql:
    image: mysql:5.7
    container_name: symfony_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: eurodata
    ports:
      - "3307:3306"